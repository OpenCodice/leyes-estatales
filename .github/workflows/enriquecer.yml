name: Generar enriquecimiento (LLM)

# Genera/actualiza la capa de enriquecimiento (metadata/generado/) de las
# constituciones estatales, para mejorar el recall del buscador. Se dispara A
# MANO. La primera corrida genera todos los artículos; las siguientes solo los
# que cambiaron (caché por hash), salvo que uses 'force'.
#
# A diferencia del federal, aquí NO se descarga el PDF: la fuente de cada estado
# ya vive versionada en {estado}/constitucion/fuente/constitucion.pdf.
#
# Requiere el secret OPENAI_API_KEY en este repo.

on:
  workflow_dispatch:
    inputs:
      estado:
        description: 'Estado a enriquecer (vacío = todos)'
        type: choice
        options: ['', jalisco, cdmx]
        default: ''
      force:
        description: 'Regenerar TODOS (ignorar la caché por hash)'
        type: boolean
        default: false

permissions:
  contents: write

env:
  EXTRACTOR_REPO: https://github.com/OpenCodice/constitucion-extractor.git
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  # estado:perfil:directorio — una línea por ley estatal presente en el repo.
  ESTADOS: "jalisco:jalisco:jalisco/constitucion cdmx:cdmx:cdmx/constitucion"

jobs:
  enriquecer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repo de datos
        uses: actions/checkout@v5

      - name: Verificar que exista la API key
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::Falta el secret OPENAI_API_KEY en este repo."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Clonar extractor e instalar dependencias
        run: |
          git clone --depth 1 "$EXTRACTOR_REPO" /tmp/extractor
          pip install -r /tmp/extractor/requirements.txt openai

      - name: Generar enriquecimiento (por estado)
        run: |
          FORCE=""
          [ "${{ inputs.force }}" = "true" ] && FORCE="--force"
          SOLO="${{ inputs.estado }}"
          for spec in $ESTADOS; do
            IFS=: read -r estado perfil dir <<< "$spec"
            if [ -n "$SOLO" ] && [ "$SOLO" != "$estado" ]; then continue; fi
            pdf="$GITHUB_WORKSPACE/$dir/fuente/constitucion.pdf"
            echo "::group::Enriquecer $estado ($perfil)"
            PYTHONPATH=/tmp/extractor python -m extractor enriquecer \
              --pdf "$pdf" --out "$GITHUB_WORKSPACE/$dir" \
              --perfil "$perfil" --proveedor openai $FORCE
            echo "::endgroup::"
          done

      - name: Commitear el resultado (si hubo cambios)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '*/constitucion/metadata/generado'
          if git diff --cached --quiet; then
            echo "Sin cambios en el enriquecimiento."
          else
            git commit -m "Enriquecimiento por LLM (generado en CI)"
            git push
            echo "Enriquecimiento actualizado y pusheado."
          fi
