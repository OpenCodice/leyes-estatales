name: Vigilar reformas estatales

# Vigila el PDF oficial de cada constitución estatal y abre un PR cuando el
# texto vigente cambia. La detección la hace git: se regenera el texto y se
# compara; NO se comparan bytes del PDF. Un job por estado (matriz), cada uno
# en su propia rama → sin carreras de push.
#
# La URL del PDF vigente la resuelve `scripts/resolver_pdf.py` del extractor:
#   - CDMX: URL de nombre estable (directo).
#   - Jalisco: el PDF lleva la fecha embebida y rota en cada reforma; el
#     resolver lee el "Listado Completo" de la biblioteca virtual y toma el más
#     reciente.
# Si algún estado cambia su sitio y el resolver falla, relanza a mano con el
# input `pdf_url` (+ `estado`). La fuente de verdad sigue siendo el PDF del repo.

on:
  schedule:
    - cron: '0 9 * * 1'        # cada lunes 09:00 UTC
  workflow_dispatch:
    inputs:
      estado:
        description: 'Limitar a un estado (vacío = todos)'
        type: choice
        options: ['', jalisco, cdmx]
        default: ''
      pdf_url:
        description: 'URL del PDF (override del resolver; requiere elegir estado)'
        type: string
        default: ''

permissions:
  contents: write
  pull-requests: write

env:
  EXTRACTOR_REPO: https://github.com/OpenCodice/constitucion-extractor.git
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  vigilar:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - estado: jalisco
            perfil: jalisco
            dir: jalisco/constitucion
          - estado: cdmx
            perfil: cdmx
            dir: cdmx/constitucion
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Clonar extractor e instalar dependencias
        run: |
          git clone --depth 1 "$EXTRACTOR_REPO" /tmp/extractor
          pip install -r /tmp/extractor/requirements.txt

      - name: Resolver URL del PDF vigente
        id: url
        run: |
          SOLO="${{ inputs.estado }}"
          OVERRIDE="${{ inputs.pdf_url }}"
          if [ -n "$SOLO" ] && [ "$SOLO" != "${{ matrix.estado }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Disparo dirigido a $SOLO; salto ${{ matrix.estado }}."
            exit 0
          fi
          if [ -n "$OVERRIDE" ] && [ "$SOLO" = "${{ matrix.estado }}" ]; then
            URL="$OVERRIDE"
          else
            URL="$(python /tmp/extractor/scripts/resolver_pdf.py ${{ matrix.estado }})"
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "::notice::${{ matrix.estado }} → $URL"

      - name: Descargar el PDF vigente
        if: steps.url.outputs.skip == 'false'
        run: curl -sSL --retry 3 -o /tmp/estatal.pdf "${{ steps.url.outputs.url }}"

      - name: Regenerar texto + metadata desde el PDF
        if: steps.url.outputs.skip == 'false'
        run: |
          PYTHONPATH=/tmp/extractor python -m extractor build \
            --pdf /tmp/estatal.pdf --out "$GITHUB_WORKSPACE/${{ matrix.dir }}" \
            --perfil "${{ matrix.perfil }}"

      - name: ¿Cambió el texto vigente?
        if: steps.url.outputs.skip == 'false'
        id: cambios
        run: |
          if [ -n "$(git status --porcelain -- "${{ matrix.dir }}")" ]; then
            echo "hay_cambios=true" >> "$GITHUB_OUTPUT"
            git status --short -- "${{ matrix.dir }}"
          else
            echo "hay_cambios=false" >> "$GITHUB_OUTPUT"
            echo "Sin cambios: el texto vigente coincide con el repo."
          fi

      - name: Enriquecer artículos cambiados (opcional, best-effort)
        if: steps.url.outputs.skip == 'false' && steps.cambios.outputs.hay_cambios == 'true' && env.OPENAI_API_KEY != ''
        continue-on-error: true
        run: |
          pip install openai
          PYTHONPATH=/tmp/extractor python -m extractor enriquecer \
            --pdf /tmp/estatal.pdf --out "$GITHUB_WORKSPACE/${{ matrix.dir }}" \
            --perfil "${{ matrix.perfil }}" --proveedor openai

      - name: Actualizar el PDF fuente (solo si hubo reforma)
        if: steps.url.outputs.skip == 'false' && steps.cambios.outputs.hay_cambios == 'true'
        run: cp /tmp/estatal.pdf "$GITHUB_WORKSPACE/${{ matrix.dir }}/fuente/constitucion.pdf"

      - name: Generar cuerpo del PR
        if: steps.url.outputs.skip == 'false' && steps.cambios.outputs.hay_cambios == 'true'
        run: |
          {
            echo "## 🏛️ Posible reforma — ${{ matrix.estado }} (detección automática)"
            echo
            echo "El texto regenerado desde el PDF oficial difiere del versionado"
            echo "en este repositorio. PR abierto automáticamente para revisar el diff."
            echo
            echo "- **Fuente:** ${{ steps.url.outputs.url }}"
            echo
            echo "### Artículos con cambios"
            git status --porcelain -- "${{ matrix.dir }}/articulos" | sed 's/^/ - /'
            echo
            echo "### Antes de aprobar"
            echo "- Revisa el diff de \`${{ matrix.dir }}/articulos/\` contra el periódico"
            echo "  oficial del estado — debe corresponder a una reforma real."
          } > /tmp/cuerpo.md
          cat /tmp/cuerpo.md

      - name: Abrir Pull Request
        if: steps.url.outputs.skip == 'false' && steps.cambios.outputs.hay_cambios == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: reforma/${{ matrix.estado }}-deteccion-automatica
          base: main
          title: '🏛️ Posible reforma — ${{ matrix.estado }} (detección automática)'
          body-path: /tmp/cuerpo.md
          commit-message: 'Actualización automática del texto vigente — ${{ matrix.estado }}'
          add-paths: ${{ matrix.dir }}/**
          labels: |
            reforma
            automatico
          delete-branch: true
